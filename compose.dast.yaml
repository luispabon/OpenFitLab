# compose.dast.yaml — overlay for DAST runs (docker compose -f compose.yaml -f compose.dast.yaml)
#
# Sets an isolated project name so the DAST stack can run alongside the dev stack
# without container, volume, or network collisions.  Port collision avoidance is
# handled by the Makefile passing DB_HOST_PORT and API_HOST_PORT overrides.
#
# Relaxes rate limits so ZAP's active scan is not throttled.
# Never use in production.
name: openfitlab-dast

services:
  api:
    environment:
      API_RATE_LIMIT_MAX: 10000
      API_RATE_LIMIT_WINDOW_MS: 60000
      AUTH_RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_WINDOW_MS: 60000
      AUTH_CALLBACK_RATE_LIMIT_MAX: 1000
      AUTH_CALLBACK_RATE_LIMIT_WINDOW_MS: 60000
      UPLOAD_RATE_LIMIT_MAX: 1000
      UPLOAD_RATE_LIMIT_WINDOW_MS: 60000
      # Disable OAuth so ZAP never follows redirects to external providers
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      APPLE_CLIENT_ID: ""
      APPLE_TEAM_ID: ""
      APPLE_KEY_ID: ""
      APPLE_PRIVATE_KEY: ""
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      STRAVA_CLIENT_ID: ""
      STRAVA_CLIENT_SECRET: ""
