<button
  mat-flat-button
  color="accent"
  (drop)="getFiles($event)"
  (click)="inputFile.click()"
  (dragover)="$event.preventDefault(); $event.stopPropagation()"
  (dragenter)="$event.preventDefault(); $event.stopPropagation()"
  (dragleave)="$event.preventDefault(); $event.stopPropagation()">
  Upload
</button>
<input
  #inputFile
  type="file"
  accept=".json,.tcx,.fit,.gpx,.sml"
  multiple
  style="display: none"
  (change)="getFiles($event)" />
