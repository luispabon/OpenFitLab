<section class="dashboard">
  <h1>Dashboard</h1>
  @if (user) {
    <div class="actions">
      <app-upload-activities [user]="user" />
    </div>
    @if (isLoading) {
      <mat-spinner diameter="32"></mat-spinner>
    }
    <div class="event-list">
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let ev">{{ ev.name || 'Untitled' }}</td>
        </ng-container>
        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let ev">{{ formatDate(ev) }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let ev">
            <a mat-button [routerLink]="['/event', ev.getID()]">View</a>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  }
</section>
