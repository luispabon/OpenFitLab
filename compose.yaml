volumes:
  db_data:
  valkey_data:
services:
  db:
    image: mariadb:12.2.2
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-qsroot}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-openfitlab}
      MARIADB_USER: ${MARIADB_USER:-qs}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-qspass}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: ${MARIADB_USER:-qs}
      DB_PASSWORD: ${MARIADB_PASSWORD:-qspass}
      DB_DATABASE: ${MARIADB_DATABASE:-openfitlab}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      OAUTH_CALLBACK_URL: ${OAUTH_CALLBACK_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "${FRONT_HOST_PORT:-4200}:4200"
    environment:
      API_PROXY_TARGET: http://api:3000
    depends_on:
      - api
    volumes:
      - .:/workspace

  adminer:
    image: ghcr.io/jeliebig/adminer-autologin:latest
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_PLUGINS: login-env-vars
      ADMINER_DRIVER: server
      ADMINER_SERVER: db
      ADMINER_USERNAME: ${MARIADB_USER:-qs}
      ADMINER_PASSWORD: ${MARIADB_PASSWORD:-qspass}
      ADMINER_DB: ${MARIADB_DATABASE:-openfitlab}
