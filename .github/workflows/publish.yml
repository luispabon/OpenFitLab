name: Publish Docker images

permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  backend-checks:
    uses: ./.github/workflows/backend-checks.yml

  frontend-checks:
    uses: ./.github/workflows/frontend-checks.yml

  e2e:
    uses: ./.github/workflows/e2e-checks.yml

  build:
    name: Build and push ${{ matrix.name }} image
    needs: [backend-checks, frontend-checks, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            image: ghcr.io/luispabon/openfitlab-backend
            context: backend
            file: backend/Dockerfile
            target: prod
          - name: backup
            image: ghcr.io/luispabon/openfitlab-backup
            context: backup
            file: backup/Dockerfile
            target: ""
          - name: frontend
            image: ghcr.io/luispabon/openfitlab-frontend
            context: frontend
            file: frontend/Dockerfile
            target: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.name == 'frontend' && format('VITE_GA_MEASUREMENT_ID={0}', secrets.VITE_GA_MEASUREMENT_ID) || '' }}
          cache-from: type=registry,ref=${{ matrix.image }}:cache-main
          cache-to: type=registry,ref=${{ matrix.image }}:cache-main,mode=max
